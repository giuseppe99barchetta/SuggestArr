<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SuggestArr Public API v1</title>
  <link rel="stylesheet" href="{{ css_url }}">
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="{{ bundle_url }}"></script>
  <script src="{{ preset_url }}"></script>
  <script>
    const swaggerConfig = {
      ...{{ swagger_config | tojson }},
      validatorUrl: null,
    };
    swaggerConfig.presets = [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset];
    swaggerConfig.plugins = [SwaggerUIBundle.plugins.DownloadUrl];
    SwaggerUIBundle(swaggerConfig);
  </script>
</body>
</html>
